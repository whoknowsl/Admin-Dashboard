<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="sidebar">
      <div class="logo"><img src="odin-lined.png" alt="" width="100px" /></div>
      <div class="sidebar-btn">
        <i class="fa-solid fa-igloo"></i><button>Home</button
        ><i class="fa-regular fa-address-card"></i><button></i>Profile</button
        ><i class="fa-regular fa-message"></i><button></i>Messages</button><i class="fa-solid fa-clock"></i><button></i></i>History</button><i class="fa-solid fa-clipboard-list"></i><button></i>Tasks</button
        ><i class="fa-solid fa-users-line"></i><button>Communities</button>
      </div>
      <div class="sidebar-btn-1">
        <i class="fa-solid fa-gear"></i><button>Settings</button>
        <i class="fa-regular fa-life-ring"></i><button>Support</button>
        <i class="fa-solid fa-shield-halved"></i><button>Privacy</button>
      </div>
    </div>
    <div class="header">
      <div class="serach-bar">
        <div class="btn-search">
          <i class="fa-solid fa-magnifying-glass fa-xl" id="icon-serach"></i
          ><input type="search" id="input-search" />
        </div>
        <div class="info-profil">
          <i class="fa-solid fa-bell fa-xl" id="icon-bell"></i>
          <img src="/profil.png" alt="profil" width="60px" id="profil-img" />
          <p>Youssef</p>
        </div>
      </div>
      <div class="profile">
        <div class="header-profile">
          <img src="/profil.png" alt="profil" width="80px" id="h-p-profile" />
          <h4 class="pro-h4">Hi there,</h4>
          <h2 class="pro-h2">Youssef Oudada(@whoknows)</h2>
        </div>
        <div class="header-btns">
          <button class="pro-btn">New</button
          ><button class="pro-btn">Upload</button
          ><button class="pro-btn">Share</button>
        </div>
      </div>
    </div>
    <div class="content"></div>
  </body>
</html>
